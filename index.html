<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎨 Раскраска Travel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            font-family: Arial, sans-serif;
        }
        .container {
            background: #16213e;
            padding: 20px;
            border-radius: 24px;
            max-width: 700px;
            width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            cursor: pointer;
            background: #f0f0f0;
            border: 2px solid #0f3460;
            touch-action: none;
            min-height: 300px;
        }
        .tools {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .tools input[type="color"] {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
        }
        .tools button {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .tools button:hover {
            transform: scale(1.05);
        }
        .tools button.reset {
            background: #00b894;
        }
        .tools button.save {
            background: #e94560;
        }
        #log {
            color: #0f0;
            background: #000;
            padding: 10px;
            border-radius: 10px;
            margin-top: 12px;
            font-size: 13px;
            font-family: monospace;
            max-height: 100px;
            overflow-y: auto;
            word-break: break-all;
        }
        .status {
            color: #fff;
            text-align: center;
            margin-top: 8px;
            font-size: 14px;
        }
        .status .ready {
            color: #00ff88;
        }
        .status .notready {
            color: #ff6b6b;
        }
        .status .loading {
            color: #fdcb6e;
        }
        .hint {
            color: #aaa;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas" width="500" height="500"></canvas>
        <div class="tools">
            <input type="color" id="colorPicker" value="#ff6b6b">
            <button class="reset" id="resetBtn">🔄 Сброс</button>
            <button class="save" id="saveBtn">💾 Сохранить</button>
        </div>
        <div id="log">▶ Загрузка...</div>
        <div class="status" id="status">⏳ Статус: <span class="loading">ЗАГРУЗКА...</span></div>
        <div class="hint" id="hint">👆 Кликни по области, чтобы закрасить</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const resetBtn = document.getElementById('resetBtn');
        const saveBtn = document.getElementById('saveBtn');
        const log = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const hint = document.getElementById('hint');

        let originalData = null;
        let isReady = false;

        function logMessage(msg) {
            log.innerHTML += '\n' + msg;
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }

        function updateStatus(type) {
            const types = {
                ready: '<span class="ready">✅ ГОТОВО!</span>',
                loading: '<span class="loading">⏳ ЗАГРУЗКА...</span>',
                error: '<span class="notready">❌ НЕТ КАРТИНКИ</span>'
            };
            statusEl.innerHTML = `📌 Статус: ${types[type] || types.loading}`;
        }

        // ========== ОБРАБОТКА КАРТИНКИ ==========
        function processImage(img) {
            try {
                let w = img.width;
                let h = img.height;
                const maxSize = 500;
                if (w > maxSize || h > maxSize) {
                    const ratio = Math.min(maxSize / w, maxSize / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                }
                canvas.width = w;
                canvas.height = h;
                logMessage('📐 Размер: ' + w + 'x' + h);

                ctx.drawImage(img, 0, 0, w, h);
                logMessage('🖼️ Картинка нарисована');

                const imageData = ctx.getImageData(0, 0, w, h);
                originalData = new Uint8ClampedArray(imageData.data);
                isReady = true;
                updateStatus('ready');
                hint.textContent = '👆 Кликни по области, чтобы закрасить!';
                logMessage('✅ ГОТОВО! Можно раскрашивать.');
            } catch (e) {
                logMessage('❌ Ошибка: ' + e.message);
                updateStatus('error');
            }
        }

        // ========== АВТОЗАГРУЗКА ==========
        function autoLoad() {
            logMessage('🔄 Загружаю travel.jpg...');
            updateStatus('loading');

            const img = new Image();
            img.crossOrigin = 'anonymous';

            img.onload = function() {
                logMessage('✅ Картинка загружена: ' + img.width + 'x' + img.height);
                processImage(img);
            };

            img.onerror = function() {
                logMessage('❌ Ошибка! travel.jpg не найден.');
                logMessage('💡 Проверь, что файл лежит рядом с index.html');
                logMessage('💡 Или загрузи на GitHub и открой через Pages');
                updateStatus('error');
                hint.textContent = '❌ Файл travel.jpg не найден! Положи его рядом.';
            };

            // ===== НАСТРОЙ ПУТЬ К КАРТИНКЕ =====
            // На GitHub: просто "travel.jpg" (рядом с index.html)
            // На компьютере: тоже "travel.jpg" (в той же папке)
            img.src = 'travel.jpg?' + Date.now();
        }

        // ========== КООРДИНАТЫ ==========
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;

            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: Math.round((clientX - rect.left) * scaleX),
                y: Math.round((clientY - rect.top) * scaleY)
            };
        }

        // ========== FLOOD FILL ==========
        function floodFill(startX, startY, fillColor) {
            if (!isReady) {
                logMessage('⚠️ Сначала загрузи картинку!');
                return;
            }

            const w = canvas.width;
            const h = canvas.height;
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;

            const idx = (startY * w + startX) * 4;
            const targetR = data[idx];
            const targetG = data[idx + 1];
            const targetB = data[idx + 2];

            logMessage(`🎯 Клик: (${startX}, ${startY}) | RGB: (${targetR},${targetG},${targetB})`);

            if (targetR < 50 && targetG < 50 && targetB < 50) {
                logMessage('⛔ Это ЧЁРНЫЙ контур!');
                return;
            }

            if (targetR === fillColor.r && targetG === fillColor.g && targetB === fillColor.b) {
                logMessage('⏭️ Уже залито');
                return;
            }

            const stack = [
                [startX, startY]
            ];
            const visited = new Uint8Array(w * h);
            let filled = 0;

            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const pos = (y * w + x) * 4;

                if (x < 0 || x >= w || y < 0 || y >= h) continue;
                if (visited[y * w + x]) continue;

                const match = Math.abs(data[pos] - targetR) < 30 &&
                    Math.abs(data[pos + 1] - targetG) < 30 &&
                    Math.abs(data[pos + 2] - targetB) < 30;

                if (!match) continue;
                if (data[pos] < 50 && data[pos + 1] < 50 && data[pos + 2] < 50) continue;

                visited[y * w + x] = 1;
                data[pos] = fillColor.r;
                data[pos + 1] = fillColor.g;
                data[pos + 2] = fillColor.b;
                data[pos + 3] = 255;
                filled++;

                stack.push([x + 1, y]);
                stack.push([x - 1, y]);
                stack.push([x, y + 1]);
                stack.push([x, y - 1]);
            }

            ctx.putImageData(imageData, 0, 0);
            logMessage(`✅ Залито ${filled} пикселей!`);
        }

        // ========== ОБРАБОТЧИКИ ==========
        function handleClick(e) {
            const { x, y } = getCoords(e);
            const hex = colorPicker.value;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            floodFill(x, y, { r, g, b });
        }

        function resetImage() {
            if (!originalData) return;
            const w = canvas.width;
            const h = canvas.height;
            ctx.putImageData(new ImageData(new Uint8ClampedArray(originalData), w, h), 0, 0);
            logMessage('🔄 Сброшено!');
        }

        function saveImage() {
            if (!isReady) return;
            const link = document.createElement('a');
            link.download = 'раскраска.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            logMessage('💾 Сохранено!');
        }

        // ========== СОБЫТИЯ ==========
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleClick(e);
        }, { passive: false });

        resetBtn.addEventListener('click', resetImage);
        saveBtn.addEventListener('click', saveImage);

        // ========== ЗАПУСК ==========
        autoLoad();
    </script>
</body>
</html>
